include:
  - ./docker-compose-base.yml

services:
  ragflow:
    depends_on:
      mysql:
        condition: service_healthy
    pull_policy: never
    build:
      context: ..
      dockerfile: docker/Dockerfile.vietocr-overlay
      args:
        BASE_IMAGE: ${RAGFLOW_IMAGE}
    image: ${RAGFLOW_VIETOCR_IMAGE:-ragflow-vietocr:local}
    entrypoint:
      - /ragflow/entrypoint.sh
    command:
      - --enable-adminserver
    ports:
      - ${SVR_WEB_HTTP_PORT}:80
      - ${SVR_WEB_HTTPS_PORT}:443
      - ${SVR_HTTP_PORT}:9380
      - ${ADMIN_SVR_HTTP_PORT}:9381
      - ${SVR_MCP_PORT}:9382 # entry for MCP (host_port:docker_port). The docker_port must match the value you set for `mcp-port` above.
      - ${GO_HTTP_PORT}:9384
      - ${GO_ADMIN_PORT}:9383
    volumes:
      - ../web:/ragflow/web
      - ../admin:/ragflow/admin
      - ../api:/ragflow/api
      - ../rag:/ragflow/rag
      - ../deepdoc:/ragflow/deepdoc
      - ../common:/ragflow/common
      - ../conf:/ragflow/conf
      - ./ragflow-logs:/ragflow/logs
      - ./nginx/ragflow.conf.python:/etc/nginx/conf.d/ragflow.conf.python
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
      - ./entrypoint.sh:/ragflow/entrypoint.sh
    env_file: .env
    environment:
      DEEPDOC_OCR_BACKEND: ${DEEPDOC_OCR_BACKEND:-vietocr}
      VIETOCR_CONFIG: ${VIETOCR_CONFIG:-vgg_seq2seq}
      VIETOCR_USE_GPU: ${VIETOCR_USE_GPU:-false}
      VIETOCR_WEIGHTS: ${VIETOCR_WEIGHTS:-}
      VIETOCR_BATCH_SIZE: ${VIETOCR_BATCH_SIZE:-16}
      TMPDIR: ${TMPDIR:-/ragflow/tmp}
      TMP: ${TMP:-/ragflow/tmp}
      TEMP: ${TEMP:-/ragflow/tmp}
    networks:
      - ragflow
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
